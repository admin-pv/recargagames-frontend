<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso restrito · Recarga Games</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07080F;
    --orange: #FF6A00;
    --orange-dark: #CC5500;
    --purple: #8B5CF6;
    --text: #F5F5F7;
    --text-muted: #8a8a96;
    --text-faint: #525260;
    --border: rgba(255,255,255,0.08);
    --glow-orange: rgba(255,106,0,0.35);
    --glow-purple: rgba(139,92,246,0.25);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--glow-purple) 0%, transparent 50%);
    filter: blur(100px);
    z-index: 0;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    top: 30%;
    right: 10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--glow-orange) 0%, transparent 60%);
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    pointer-events: none;
  }

  .gate {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 40px 32px;
    background: rgba(13,14,24,0.7);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease-out 0.1s forwards;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .logo-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 10px var(--glow-orange);
  }

  .lock-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,106,0,0.08);
    border: 1px solid rgba(255,106,0,0.2);
    border-radius: 12px;
  }
  .lock-icon svg { width: 22px; height: 22px; stroke: var(--orange); }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
    letter-spacing: 0.01em;
    text-align: center;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 32px;
  }

  form { display: flex; flex-direction: column; gap: 12px; }

  .input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .input::placeholder { color: var(--text-faint); }
  .input:focus {
    outline: none;
    border-color: var(--orange);
    background: rgba(255,255,255,0.05);
  }
  .input:disabled { opacity: 0.5; cursor: not-allowed; }
  .input.error { border-color: rgba(229,62,62,0.5); }

  .submit-btn {
    margin-top: 4px;
    background: linear-gradient(180deg, #FF9940 0%, var(--orange) 55%, var(--orange-dark) 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 5px 0 #7a2e00, 0 8px 20px var(--glow-orange);
    transition: transform 0.12s, box-shadow 0.12s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.45);
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #7a2e00, 0 12px 24px var(--glow-orange); }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #7a2e00, 0 4px 12px var(--glow-orange); }
  .submit-btn:disabled {
    background: rgba(255,255,255,0.08);
    color: var(--text-faint);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
    text-shadow: none;
  }

  .error-msg {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(229,62,62,0.08);
    border: 1px solid rgba(229,62,62,0.25);
    border-radius: 8px;
    font-size: 13px;
    color: #f4a8a8;
    display: none;
    text-align: center;
  }
  .error-msg.show { display: block; }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.6;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .gate.shake { animation: shake 0.4s ease-in-out; }
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="gate" id="gate">
  <div class="logo">
    RECARGA<span class="logo-dot"></span>GAMES
  </div>

  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <h1>Acesso restrito</h1>
  <p class="subtitle">
    Esta área está em desenvolvimento.<br>
    Insira a senha de acesso para continuar.
  </p>

  <form id="gateForm" novalidate>
    <input
      type="password"
      name="password"
      id="password"
      class="input"
      placeholder="Senha de acesso"
      required
      autocomplete="off"
      autofocus>

    <button type="submit" class="submit-btn" id="submitBtn">
      Entrar
    </button>
  </form>

  <div class="error-msg" id="errorMsg"></div>

  <div class="footer-note">
    Em breve para todos.<br>
    <a href="/" style="color: var(--text-muted); text-decoration: underline;">Voltar para home</a>
  </div>
</div>

<script>
  const form = document.getElementById('gateForm');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const gateBox = document.getElementById('gate');

  // Recupera o destino original (se veio de um redirect com ?next=...)
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/br/';

  function showError(text) {
    errorMsg.textContent = text;
    errorMsg.classList.add('show');
    passwordInput.classList.add('error');
    gateBox.classList.add('shake');
    setTimeout(() => gateBox.classList.remove('shake'), 400);
  }

  function clearError() {
    errorMsg.classList.remove('show');
    passwordInput.classList.remove('error');
  }

  passwordInput.addEventListener('input', clearError);

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearError();

    const password = passwordInput.value;
    if (!password) {
      showError('Por favor, informa a senha.');
      return;
    }

    submitBtn.disabled = true;
    passwordInput.disabled = true;
    submitBtn.textContent = 'Verificando...';

    try {
      const response = await fetch('/_gate/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password, next: next })
      });

      if (response.ok) {
        // Cookie já foi setado pela Edge Function. Redirect.
        const data = await response.json();
        window.location.href = data.redirect || next;
      } else if (response.status === 401) {
        showError('Senha incorreta.');
        submitBtn.disabled = false;
        passwordInput.disabled = false;
        submitBtn.textContent = 'Entrar';
        passwordInput.value = '';
        passwordInput.focus();
      } else if (response.status === 429) {
        showError('Muitas tentativas. Tenta novamente em alguns minutos.');
        submitBtn.disabled = false;
        passwordInput.disabled = false;
        submitBtn.textContent = 'Entrar';
      } else {
        showError('Erro ao verificar. Tenta novamente.');
        submitBtn.disabled = false;
        passwordInput.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    } catch (err) {
      console.error(err);
      showError('Sem conexão. Verifica sua internet.');
      submitBtn.disabled = false;
      passwordInput.disabled = false;
      submitBtn.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
